<!DOCTYPE html>
<html>
<head>
    <title>Samsam Project</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111, #333);
            color: white;
            text-align: center;
        }

        .hero {
            padding: 100px 20px;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            opacity: 0.8;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #00c3ff;
            cursor: pointer;
        }

        button:hover {
            background-color: #0099cc;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Bienvenid</h1>
        <p>Este</p>
        <button onclick="alert('Hola')">
            Haz clic aquí
        </button>
    </div>

</body>
</html>
